{% extends 'base.html' %}
{% block title %}修改密码{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-cute">
                <div class="card-header"><i class="bi bi-key"></i> 修改密码</div>
                <div class="card-body">
                    <form method="post" class="form-cute">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">原密码</label>
                            <input type="password" name="old_password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">新密码</label>
                            <input type="password" name="new_password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">确认新密码</label>
                            <input type="password" name="new_password2" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-cute btn-cute-primary"><i class="bi bi-check-lg"></i> 确认修改</button>
                        <a href="{% url 'accounts:profile' %}" class="btn btn-cute btn-cute-outline">返回</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
