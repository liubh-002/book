{% extends 'base.html' %}
{% load static %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-title">
            <div style="font-size:3rem;margin-bottom:0.5rem;">🎉</div>
            <h2>加入我们</h2>
            <p>注册萌宠洗护大家庭</p>
        </div>
        <form method="post" class="form-cute">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person"></i> 用户名 *</label>
                <input type="text" name="username" class="form-control" required placeholder="设置登录用户名">
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-chat"></i> 昵称</label>
                <input type="text" name="nickname" class="form-control" placeholder="给自己取个可爱的名字吧">
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-phone"></i> 手机号</label>
                <input type="text" name="phone" class="form-control" placeholder="手机号码">
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-lock"></i> 密码 *</label>
                <input type="password" name="password" class="form-control" required placeholder="设置密码（至少6位）">
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-lock-fill"></i> 确认密码 *</label>
                <input type="password" name="password2" class="form-control" required placeholder="再次输入密码">
            </div>
            <button type="submit" class="btn btn-cute btn-cute-primary w-100 mt-2">
                <i class="bi bi-person-plus"></i> 立即注册
            </button>
            <div class="text-center mt-3">
                <a href="{% url 'accounts:login' %}" class="text-cute-primary">已有账号？立即登录</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_css %}
<style>
    body { background: transparent !important; }
</style>
{% endblock %}
